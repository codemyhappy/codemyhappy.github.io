<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全新开始的网站 | 新项目</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .container {
      max-width: 800px;
      width: 90%;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #2c3e50;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 30px;
      color: #555;
    }

    .features {
      text-align: left;
      margin: 30px 0;
    }

    .feature {
      margin: 15px 0;
      display: flex;
      align-items: center;
    }

    .feature::before {
      content: "✓";
      display: inline-block;
      width: 25px;
      height: 25px;
      background: #4CAF50;
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 25px;
      margin-right: 10px;
    }

    .btn {
      background: #3498db;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }

    .btn:hover {
      background: #2980b9;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>全新的开始</h1>
    <p>欢迎来到重新构建的网站。这里将是一个全新的开始，没有历史提交记录，只有干净的代码结构。</p>
    
    <div class="features">
      <div class="feature">现代响应式设计</div>
      <div class="feature">优化的性能表现</div>
      <div class="feature">清晰的代码结构</div>
      <div class="feature">易于维护和扩展</div>
    </div>
    
    <p>这个项目已经清除了不必要的文件，现在是一个干净的起点。您可以在此基础上构建新的功能。</p>
    
    <a href="#" class="btn">开始探索</a>
  </div>
</body>
</html>
